version: "3.8"
services:
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: voicescribe
    ports:
      - "5432:5432"
