<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Fren-Edu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1 class="title">Fren-Edu</h1>

    <div class="orb"></div>

    <button id="rekamBtn">🎤 Mulai Rekam</button>

    <div id="result" class="card">
      Hasil rekaman akan muncul di sini...
    </div>
  </div>
  <div class="controls card">
    <button id="ringkasBtn">🧠 Ringkas</button>
    <button id="generateQaBtn">❓ Buat Pertanyaan</button>
    <button id="speakSummaryBtn">🔊 Bersuara (TTS)</button>

    <div class="voice-settings">
      <label for="voiceSelect">Suara:</label>
      <select id="voiceSelect"></select>
      <label for="rateRange">Kecepatan:</label>
      <input id="rateRange" type="range" min="0.5" max="1.8" step="0.1" value="1">
    </div>
  </div>

  <div class="card" id="transcriptCard">
    <h3>Transkrip</h3>
    <div id="transcript">—</div>
  </div>

  <div class="card" id="summaryCard">
    <h3>Ringkasan</h3>
    <div id="summary">—</div>
    <h4>Poin Penting</h4>
    <ul id="keyPoints"></ul>
  </div>

  <div class="card" id="qaCard">
    <h3>Q&A</h3>
    <input id="question" placeholder="Tanya dari materi..." />
    <button id="tanyaBtn">💬 Tanya</button>
    <div id="answerArea"></div>
    <div id="generatedQuestions"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
